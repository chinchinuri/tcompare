<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Порівняння текстів</title>
    
    <!-- CSS стилі для гарного вигляду -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/diff2html/3.4.34/diff2html.min.css">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f6f8fa; 
            color: #24292f;
        }
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        h2 { margin-top: 0; text-align: center; color: #0969da; }
        .inputs { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 20px; 
        }
        .input-group { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }
        label { margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        textarea { 
            height: 250px; 
            padding: 12px; 
            border: 1px solid #d0d7de; 
            border-radius: 6px; 
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 14px;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1); }
        button { 
            padding: 12px 24px; 
            background-color: #1f883d; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600; 
            width: 100%; 
            margin-bottom: 25px;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1a7f37; }
        #diff-output { border: 1px solid #d0d7de; border-radius: 6px; overflow: hidden; }
        .empty-msg { text-align: center; color: #6e7781; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Порівняння текстів</h2>
    
    <div class="inputs">
        <div class="input-group">
            <label>Оригінальний текст (Старий)</label>
            <textarea id="text1" placeholder="Вставте оригінальний текст тут...">Слава Україні!
Це приклад тексту, який ми будемо порівнювати.
Рядок, який залишиться без змін.</textarea>
        </div>
        <div class="input-group">
            <label>Змінений текст (Новий)</label>
            <textarea id="text2" placeholder="Вставте новий текст тут...">Героям Слава!
Це приклад тексту, який ми щойно змінили.
Рядок, який залишиться без змін.</textarea>
        </div>
    </div>

    <button onclick="compareTexts()">Порівняти зараз</button>

    <div id="diff-output">
        <div class="empty-msg">Натисніть "Порівняти", щоб побачити результат</div>
    </div>
</div>

<!-- Підключення бібліотек через надійні CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/diff2html/3.4.34/diff2html.min.js"></script>

<script>
    function compareTexts() {
        const text1 = document.getElementById('text1').value;
        const text2 = document.getElementById('text2').value;
        const outputElement = document.getElementById('diff-output');

        try {
            // 1. Створюємо різницю (patch)
            // Параметри: назва файлу 1, назва файлу 2, текст 1, текст 2, мітка 1, мітка 2
            const patch = Diff.createTwoFilesPatch('Оригінал', 'Змінено', text1, text2, '', '');

            if (!patch || patch.trim().length === 0) {
                outputElement.innerHTML = '<div class="empty-msg">Тексти ідентичні</div>';
                return;
            }

            // 2. Конвертуємо patch у HTML за допомогою Diff2Html
            const diffHtml = Diff2Html.html(patch, {
                drawFileList: false,
                matching: 'lines',
                outputFormat: 'side-by-side', // Можна змінити на 'line-by-line'
                rawContent: true
            });

            // 3. Виводимо результат
            outputElement.innerHTML = diffHtml;
        } catch (error) {
            console.error(error);
            outputElement.innerHTML = '<div style="color:red; padding:20px;">Помилка: ' + error.message + '</div>';
        }
    }

    // Запускаємо порівняння один раз при старті
    window.onload = compareTexts;
</script>

</body>
</html>
