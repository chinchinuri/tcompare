<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Порівняння текстів (Fixed)</title>
    
    <!-- CSS: Бібліотека + власні стилі -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .inputs { display: flex; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1; }
        textarea { width: 100%; height: 150px; box-sizing: border-box; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        button:hover { background: #0056b3; }
        #diff-output { margin-top: 10px; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Порівняння текстів</h2>
    
    <div class="inputs">
        <div class="input-group">
            <label>Текст А:</label>
            <textarea id="text1">Я люблю програмування на JavaScript.
Це дуже цікаво!</textarea>
        </div>
        <div class="input-group">
            <label>Текст Б:</label>
            <textarea id="text2">Я люблю програмування та розробку.
Це дуже захоплююче!</textarea>
        </div>
    </div>

    <button id="compareBtn">Порівняти тексти</button>

    <div id="diff-output"></div>
</div>

<!-- Важливо: завантажуємо jsdiff ПЕРШИМ -->
<script src="https://cdn.jsdelivr.net/npm/diff@5.1.0/dist/diff.min.js"></script>
<!-- Потім Diff2Html -->
<script src="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/js/diff2html.min.js"></script>

<script>
    document.getElementById('compareBtn').addEventListener('click', function() {
        const text1 = document.getElementById('text1').value;
        const text2 = document.getElementById('text2').value;
        const outputElement = document.getElementById('diff-output');

        // Перевірка, чи завантажилися бібліотеки
        if (typeof Diff === 'undefined' || typeof Diff2Html === 'undefined') {
            alert('Помилка: Бібліотеки ще завантажуються або заблоковані. Спробуйте оновити сторінку.');
            return;
        }

        try {
            // 1. Створюємо патч
            const patch = Diff.createTwoFilesPatch('Старий текст', 'Новий текст', text1, text2);

            // 2. Рендеримо HTML
            // Зверніть увагу: у деяких версіях це Diff2Html.html, у деяких Diff2Html.getPrettyHtml
            const diffHtml = Diff2Html.html(patch, {
                drawFileList: false,
                matching: 'lines',
                outputFormat: 'side-by-side'
            });

            outputElement.innerHTML = diffHtml;
        } catch (err) {
            console.error(err);
            outputElement.innerHTML = '<p style="color:red">Сталася помилка при порівнянні: ' + err.message + '</p>';
        }
    });

    // Запустити при старті
    window.onload = function() {
        document.getElementById('compareBtn').click();
    };
</script>

</body>
</html>
